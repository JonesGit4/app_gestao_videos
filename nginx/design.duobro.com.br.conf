# Bloco adicionado ao server block existente de design.duobro.com.br
# Arquivo: /etc/nginx/sites-enabled/design.duobro.com.br

# Servir arquivos estáticos do dashboard (sem autenticação)
location /dashboard/ {
    alias /var/www/design.duobro.com.br/dashboard/;
    index index.html;
    auth_basic off;
    allow all;
}

# Proxy da API (token NocoDB fica no servidor, não no frontend)
location /api/ {
    proxy_pass http://127.0.0.1:3099;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}
